<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title><?= place ?>の落とし物一覧</title>

  <style>
    body { font-family: sans-serif; margin: 20px; background-color: #f8f8f8; }
    h2 { color: #333; border-bottom: 2px solid #ccc; padding-bottom: 10px; }
    table { border-collapse: collapse; width: 90%; margin: 20px auto; background-color: #fff; }
    th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
    th { background-color: #eef; }
    img { max-height: 120px; border-radius: 4px; }
    .no-items { text-align: center; margin-top: 30px; color: gray; }
    #loading { text-align: center; margin-top: 40px; font-size: 1.2em; color: #007bff; }
  </style>
</head>
<body>

  <h2><?= place ?> の落とし物一覧</h2>

  <div id="loading">読み込み中...</div>
  <div id="lostItemsContainer"></div>

  <script>
    const place = '<?= place ?>';

    // ✅ データ読込
    function loadLostItems() {
      google.script.run
        .withSuccessHandler(displayLostItems)
        .withFailureHandler(handleError)
        .getLostItemsByLocation(place);
    }

    // ✅ 表示処理
    function displayLostItems(items) {
      document.getElementById("loading").style.display = "none";

      if (items.length === 0) {
        document.getElementById("lostItemsContainer").innerHTML =
          `<div class="no-items">この場所の落とし物はありません。</div>`;
        return;
      }

      let html = `
        <table>
          <tr>
            <th>日時</th>
            <th>落とし物</th>
            <th>写真</th>
          </tr>
      `;

      items.forEach(item => {
        const imgHtml = item.base64img
          ? `<img src="${item.base64img}">`
          : 'なし';

        html += `
          <tr>
            <td>${item.timestamp}</td>
            <td>${item.item}</td>
            <td>${imgHtml}</td>
          </tr>`;
      });

      html += "</table>";

      document.getElementById("lostItemsContainer").innerHTML = html;
    }

    function handleError(e) {
      document.getElementById("loading").innerText =
        "エラーが発生しました。";
    }

    window.onload = loadLostItems;
  </script>

</body>
</html>
